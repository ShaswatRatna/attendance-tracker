<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Calculator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0d0f14;
      --card:     #1c2028;
      --surface:  #161920;
      --border:   #2a2f3a;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --green:    #22c55e;
      --yellow:   #f59e0b;
      --red:      #ef4444;
      --blue:     #3b82f6;
      --green-bg: rgba(34,197,94,0.08);
      --yellow-bg:rgba(245,158,11,0.08);
      --red-bg:   rgba(239,68,68,0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    header { max-width: 500px; margin: 0 auto 1.5rem; }
    header h1 { font-size: 22px; font-weight: 700; }
    header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

    .main { max-width: 500px; margin: 0 auto; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--blue); }

    .btn-calc {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-calc:hover { background: #2563eb; }

    .result-card {
      border-left: 4px solid transparent;
    }
    .result-card.safe   { border-left-color: var(--green); }
    .result-card.warn   { border-left-color: var(--yellow); }
    .result-card.danger { border-left-color: var(--red); }

    .pct-display {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .pct-display.safe   { color: var(--green); }
    .pct-display.warn   { color: var(--yellow); }
    .pct-display.danger { color: var(--red); }

    .pct-sub { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }

    .progress-wrap {
      background: var(--border);
      border-radius: 100px;
      height: 6px;
      margin-bottom: 1.25rem;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 100px;
      transition: width 0.4s ease;
    }
    .progress-bar.safe   { background: var(--green); }
    .progress-bar.warn   { background: var(--yellow); }
    .progress-bar.danger { background: var(--red); }

    .alert-box {
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
    }
    .alert-box.safe   { background: var(--green-bg);  color: var(--green); }
    .alert-box.warn   { background: var(--yellow-bg); color: var(--yellow); }
    .alert-box.danger { background: var(--red-bg);    color: var(--red); }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>📅 Attendance Calculator</h1>
    <p>Formula: 100 − (((Total Absent − OAA) ÷ Total Lectures) × 100)</p>
  </header>

  <div class="main">

    <div class="card">
      <div class="field">
        <label>What attendance % do you want to maintain?</label>
        <input type="number" id="target-pct" placeholder="e.g. 75" min="1" max="100" />
      </div>
      <div class="field">
        <label>Total Lectures</label>
        <input type="number" id="total" placeholder="e.g. 60" min="1" />
      </div>
      <div class="field">
        <label>Total Absent</label>
        <input type="number" id="absent" placeholder="e.g. 20" min="0" />
      </div>
      <div class="field">
        <label>OAA Leaves</label>
        <input type="number" id="oaa" placeholder="e.g. 2" min="0" />
      </div>
      <button class="btn-calc" onclick="calculate()">Calculate</button>
    </div>

    <div class="card result-card hidden" id="result-card">
      <div class="pct-display" id="pct-display">0%</div>
      <div class="pct-sub" id="pct-sub"></div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="alert-box" id="alert-box"></div>
    </div>

  </div>

  <script>
    function calcPct(total, absent, oaa) {
      const pct = 100 - (((absent - oaa) / total) * 100);
      return Math.max(0, Math.min(100, pct));
    }

    function calculate() {
      const target = parseFloat(document.getElementById('target-pct').value);
      const total  = parseInt(document.getElementById('total').value);
      const absent = parseInt(document.getElementById('absent').value);
      const oaa    = parseInt(document.getElementById('oaa').value) || 0;

      if (!target || target <= 0 || target > 100) return alert('Please enter a valid target percentage.');
      if (!total || total <= 0) return alert('Please enter total lectures.');
      if (absent === null || isNaN(absent) || absent < 0) return alert('Please enter total absent.');
      if (oaa > absent) return alert('OAA cannot be more than total absent.');

      const pct = calcPct(total, absent, oaa);
      const present = total - (absent - oaa);

      let status, alertMsg;

      if (pct >= target) {
        status = 'safe';
        const t = target / 100;
        const extraMissed = Math.max(0, Math.floor((present / t) - total));
        alertMsg = `✅ You are at ${pct.toFixed(2)}%, above your target of ${target}%. You can take ${extraMissed} more leave(s) / miss ${extraMissed} more lecture(s) and still stay at or above ${target}%.`;
      } else {
        status = pct >= target - 10 ? 'warn' : 'danger';
        const t = target / 100;
        const denom = 1 - t;
        let needed = Math.ceil(((t * total) - present) / denom);
        needed = Math.max(1, needed);
        const icon = status === 'warn' ? '⚠️' : '🚨';
        alertMsg = `${icon} You are at ${pct.toFixed(2)}%, below your target of ${target}%. You must attend the next ${needed} lecture(s) without missing any to reach ${target}%.`;
      }

      document.getElementById('result-card').classList.remove('hidden', 'safe', 'warn', 'danger');
      document.getElementById('result-card').classList.add(status);

      document.getElementById('pct-display').className = `pct-display ${status}`;
      document.getElementById('pct-display').textContent = `${pct.toFixed(2)}%`;

      document.getElementById('pct-sub').textContent = `Target: ${target}% · Present: ${present} / ${total} lectures`;

      document.getElementById('progress-bar').className = `progress-bar ${status}`;
      document.getElementById('progress-bar').style.width = `${Math.min(100, pct)}%`;

      document.getElementById('alert-box').className = `alert-box ${status}`;
      document.getElementById('alert-box').textContent = alertMsg;
    }
  </script>

</body>
</html>
